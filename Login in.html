<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voting Management System - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">
  <header class="site-header">
    <div class="brand">VoteSphere</div>
    <nav class="nav-links">
      <a href="Home page.html" data-page="home">Home</a>
      <a href="About site.html" data-page="about">About</a>
      <a href="Registration.html" data-page="registration">Register</a>
      <a href="Login in.html" data-page="login">Login</a>
      <a href="Voting.html" data-page="voting">Voting</a>
    </nav>
    <div class="nav-links">
      <span id="authState" class="muted">Not logged in</span>
      <button id="logoutBtn" class="btn hide" type="button">Logout</button>
    </div>
  </header>

  <main>
    <section class="card" style="max-width: 520px; margin: 0 auto;">
      <h1>Login</h1>
      <p class="muted">Use your registered voter account, or test admin account: admin@vms.local / admin123</p>
      <form id="loginForm" class="form">
        <label>
          Email
          <input type="email" name="email" required placeholder="yourname@example.com">
        </label>
        <label>
          Password
          <input type="password" name="password" required placeholder="Enter your password">
        </label>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      <div id="loginMessage" class="message"></div>
      <p class="muted" style="margin-top: 12px;">New user? <a class="inline-link" href="Registration.html">Create your voter account</a></p>
    </section>
  </main>

  <footer class="footer">Voting Management System</footer>
  <script src="app.js"></script>
</body>
</html>
